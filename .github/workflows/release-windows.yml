name: Build Windows binary

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v0.0.2)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows x86_64 binary
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare asset
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          ASSET="zymbol_lang_v${VERSION}_x86_64_windows.exe"
          cp target/x86_64-pc-windows-msvc/release/zymbol.exe "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Compute SHA256
        shell: bash
        run: |
          sha256sum "$ASSET" | tee SHA256_x86_64_windows.txt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$TAG" "$ASSET" SHA256_x86_64_windows.txt --clobber
