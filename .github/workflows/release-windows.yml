name: Build Windows binary

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v0.0.2)'
        required: true

permissions:
  contents: write
  id-token: write   # required by SignPath

jobs:
  build-windows:
    name: Windows x86_64 binary
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare asset
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          ASSET="zymbol_lang_v${VERSION}_x86_64_windows.exe"
          cp target/x86_64-pc-windows-msvc/release/zymbol.exe "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Compute SHA256
        shell: bash
        run: |
          sha256sum "$ASSET" | tee SHA256_x86_64_windows.txt

      - name: Build MSI installer
        shell: bash
        run: |
          choco install wixtoolset --no-progress -y
          export PATH="/c/Program Files (x86)/WiX Toolset v3.14/bin:$PATH"

          MSI_ASSET="zymbol_lang_v${VERSION}_x86_64_windows.msi"
          GUID_UPGRADE="A1B2C3D4-E5F6-7890-ABCD-EF1234567890"

          mkdir -p msi_staging
          cp target/x86_64-pc-windows-msvc/release/zymbol.exe msi_staging/zymbol.exe
          cp LICENSE msi_staging/LICENSE 2>/dev/null || cp LICENSE-AGPL-3.0 msi_staging/LICENSE

          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{GUID_UPGRADE}}/${GUID_UPGRADE}/g" \
            packaging/templates/zymbol.wxs.in > msi_staging/zymbol.wxs

          cd msi_staging
          candle.exe zymbol.wxs -arch x64 -o zymbol.wixobj
          light.exe zymbol.wixobj -o "../${MSI_ASSET}"
          cd ..

          echo "MSI_ASSET=$MSI_ASSET" >> "$GITHUB_ENV"

      - name: Upload unsigned MSI as artifact
        id: upload-unsigned-msi
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-unsigned
          path: "*.msi"
          if-no-files-found: error

      - name: Sign MSI via SignPath
        id: sign-msi
        continue-on-error: true
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token:                    ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id:              ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug:                 zymbol-lang
          signing-policy-slug:          release-signing
          artifact-configuration-slug:  windows-installer
          github-artifact-id:           ${{ steps.upload-unsigned-msi.outputs.artifact-id }}
          wait-for-completion:          true
          output-artifact-directory:    signed

      - name: Upload to release (signed MSI)
        if: steps.sign-msi.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          SIGNED_MSI="signed/${MSI_ASSET}"
          gh release upload "$TAG" "$ASSET" SHA256_x86_64_windows.txt "$SIGNED_MSI" --clobber

      - name: Upload to release (unsigned MSI fallback)
        if: steps.sign-msi.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$TAG" "$ASSET" SHA256_x86_64_windows.txt "${MSI_ASSET}" --clobber
