ShortDescription: A keyword-free symbolic programming language
Description: |-
  Zymbol is a keyword-free symbolic programming language where every construct
  (conditionals, loops, functions, I/O, error handling) uses pure symbols
  instead of reserved words. Includes a tree-walker interpreter, a register VM,
  LSP server, REPL, formatter, and VS Code extension.
